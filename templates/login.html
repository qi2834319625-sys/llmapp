<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Portal">
    <meta name="theme-color" content="#302b63">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>登录 - 多系统门户</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .bg-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: rgba(255,255,255,0.3); border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        .login-container {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 50px 40px;
            width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center; margin-bottom: 35px;
        }
        .login-logo h1 {
            font-size: 2.2em; color: #fff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-logo p { color: rgba(255,255,255,0.5); font-size: 0.95em; }
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.7);
            margin-bottom: 8px; font-size: 0.9em;
        }
        .form-group input {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; color: #fff; font-size: 1em;
            transition: all 0.3s; outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
            background: rgba(255,255,255,0.12);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 12px; color: #fff;
            font-size: 1.1em; font-weight: 600; cursor: pointer;
            transition: all 0.3s; margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .error-msg {
            background: rgba(255,82,82,0.15);
            border: 1px solid rgba(255,82,82,0.3);
            color: #ff5252; padding: 12px; border-radius: 10px;
            margin-bottom: 20px; text-align: center; font-size: 0.9em;
        }
        .heart-decoration {
            position: absolute; font-size: 1.5em; opacity: 0.15;
            animation: heartbeat 2s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .music-hint {
            text-align: center; margin-top: 20px;
            color: rgba(255,255,255,0.3); font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>
    <div class="login-container">
        <div class="heart-decoration" style="top:20px;left:20px;">💜</div>
        <div class="heart-decoration" style="top:60px;right:30px;animation-delay:0.5s;">💙</div>
        <div class="heart-decoration" style="bottom:40px;left:40px;animation-delay:1s;">💜</div>
        <div class="login-logo">
            <h1>✨ Portal ✨</h1>
            <p>多系统智能门户平台</p>
        </div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn">登 录</button>
        </form>
        <div class="music-hint">🎵 登录后享受背景音乐</div>
    </div>
    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (10 + Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
