<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💄 美妆系统</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#1a0a14 0%,#2d1528 25%,#4a1935 50%,#2d1528 75%,#1a0a14 100%);
  background-size:400% 400%;animation:bgMove 20s ease infinite;
  font-family:'Segoe UI','Microsoft YaHei',sans-serif;color:#fff;overflow-x:hidden;
}
#app{position:relative;z-index:1}
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:100}
.nav .logo{font-size:22px;cursor:pointer;background:linear-gradient(135deg,#ff7597,#ffb7b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.back-btn{padding:8px 20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:#fff;font-size:14px;cursor:pointer;transition:all .3s}
.back-btn:hover{background:rgba(255,117,151,.3)}

.main{padding:90px 40px 40px;max-width:1200px;margin:0 auto}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.menu-item{padding:14px;border-radius:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .3s;font-size:14px}
.menu-item:hover{background:rgba(255,117,151,.15)}
.menu-item.active{background:linear-gradient(135deg,rgba(255,117,151,.3),rgba(255,183,178,.2));border-color:#ff7597;font-weight:600}

.section{background:rgba(255,255,255,.05);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;margin-bottom:20px;animation:fadeInUp .4s ease}
.section-title{font-size:22px;margin-bottom:18px;display:flex;align-items:center;gap:10px}

.tutorial-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:22px;margin-bottom:14px;
  transition:all .3s;animation:fadeInUp .3s ease backwards;
}
.tutorial-card:hover{background:rgba(255,117,151,.08);transform:translateY(-3px)}
.tutorial-type{display:inline-block;padding:3px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:10px}
.tutorial-type.tutorial{background:rgba(255,117,151,.2);color:#ff7597}
.tutorial-type.product{background:rgba(102,126,234,.2);color:#667eea}
.tutorial-type.inspiration{background:rgba(255,211,42,.2);color:#ffd32a}
.tutorial-title{font-size:18px;font-weight:600;margin-bottom:10px;color:#ffb7b2}
.tutorial-content{color:rgba(255,255,255,.7);font-size:14px;line-height:1.8;white-space:pre-wrap}
.tutorial-tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.tutorial-tag{padding:2px 10px;background:rgba(255,255,255,.08);border-radius:10px;font-size:12px;color:rgba(255,255,255,.5)}

/* Color palette */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:16px}
.color-swatch{text-align:center}
.color-circle{width:60px;height:60px;border-radius:50%;margin:0 auto 8px;border:2px solid rgba(255,255,255,.2)}
.color-name{font-size:13px;color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <div class="logo" @click="goHome">💄 美妆系统</div>
    <button class="back-btn" @click="goHome">← 返回主页</button>
  </div>

  <div class="main">
    <div class="menu-grid">
      <div class="menu-item" :class="{active:sub==='all'}" @click="sub='all'">💄 全部内容</div>
      <div class="menu-item" :class="{active:sub==='tutorial'}" @click="sub='tutorial'">📖 化妆教程</div>
      <div class="menu-item" :class="{active:sub==='product'}" @click="sub='product'">🛍️ 产品推荐</div>
      <div class="menu-item" :class="{active:sub==='inspiration'}" @click="sub='inspiration'">✨ 妆容灵感</div>
      <div class="menu-item" :class="{active:sub==='skincare'}" @click="sub='skincare'">🧴 护肤指南</div>
      <div class="menu-item" :class="{active:sub==='trend'}" @click="sub='trend'">🔥 流行趋势</div>
    </div>

    <div class="section">
      <div class="section-title">💄 {{ subTitle }}</div>
      <div v-for="(item,i) in displayItems" :key="i" class="tutorial-card" :style="'animation-delay:'+(i*0.05)+'s'">
        <span class="tutorial-type" :class="item.resource_type">{{ typeName(item.resource_type) }}</span>
        <div class="tutorial-title">{{ item.title }}</div>
        <div class="tutorial-content">{{ item.content }}</div>
        <div class="tutorial-tags" v-if="item.tags">
          <span class="tutorial-tag" v-for="t in item.tags.split(',')" :key="t.trim()">{{ t.trim() }}</span>
        </div>
      </div>
      <div v-if="!displayItems.length" style="text-align:center;padding:40px;color:rgba(255,255,255,.3)">暂无相关内容</div>
    </div>

    <!-- Color inspiration -->
    <div class="section" v-if="sub==='all'||sub==='inspiration'||sub==='trend'">
      <div class="section-title">🎨 2025流行色</div>
      <div class="color-grid">
        <div class="color-swatch"><div class="color-circle" style="background:#e8a0a0"></div><div class="color-name">玫瑰粉</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#c9a86c"></div><div class="color-name">香槟金</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#d4a5a5"></div><div class="color-name">干枯玫瑰</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#b8860b"></div><div class="color-name">焦糖棕</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#9b59b6"></div><div class="color-name">薰衣草紫</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#2ecc71"></div><div class="color-name">薄荷绿</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#e74c3c"></div><div class="color-name">正红色</div></div>
        <div class="color-swatch"><div class="color-circle" style="background:#f39c12"></div><div class="color-name">珊瑚橙</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const {createApp}=Vue;
createApp({
  data(){
    return{
      sub:'all',
      items:[],
    }
  },
  computed:{
    subTitle(){
      return{all:'全部内容',tutorial:'化妆教程',product:'产品推荐',inspiration:'妆容灵感',skincare:'护肤指南',trend:'流行趋势'}[this.sub]||'内容';
    },
    displayItems(){
      if(this.sub==='all') return this.items;
      if(this.sub==='tutorial') return this.items.filter(i=>i.resource_type==='tutorial');
      if(this.sub==='product') return this.items.filter(i=>i.resource_type==='product');
      if(this.sub==='inspiration') return this.items.filter(i=>i.resource_type==='inspiration');
      if(this.sub==='skincare') return this.items.filter(i=>(i.tags||'').includes('Skincare'));
      if(this.sub==='trend') return this.items.filter(i=>(i.tags||'').includes('Trend'));
      return this.items;
    }
  },
  methods:{
    goHome(){window.location.href='/main'},
    typeName(t){return{tutorial:'教程',product:'产品',inspiration:'灵感'}[t]||t},
    async loadData(){
      const r=await fetch('/api/makeup',{headers:{'Authorization':'Bearer '+token}});
      if(r.ok) this.items=await r.json();
    },
  },
  mounted(){this.loadData()}
}).mount('#app');

const token=localStorage.getItem('token')||'';
if(!token) window.location.href='/';
</script>
</body>
</html>
