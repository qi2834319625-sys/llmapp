<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 投资理财</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#1a0f0a 0%,#2e1a10 25%,#3d2015 50%,#2e1a10 75%,#1a0f0a 100%);
  background-size:400% 400%;animation:bgMove 20s ease infinite;
  font-family:'Segoe UI','Microsoft YaHei',sans-serif;color:#fff;overflow-x:hidden;
}
#app{position:relative;z-index:1}
.nav{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:100}
.nav .logo{font-size:22px;cursor:pointer;background:linear-gradient(135deg,#ff9a9e,#fad0c4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.back-btn{padding:8px 20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:#fff;font-size:14px;cursor:pointer;transition:all .3s}
.back-btn:hover{background:rgba(255,154,158,.3)}

.main{padding:90px 40px 40px;max-width:1200px;margin:0 auto}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.menu-item{padding:14px;border-radius:12px;cursor:pointer;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .3s;font-size:14px}
.menu-item:hover{background:rgba(255,154,158,.15)}
.menu-item.active{background:linear-gradient(135deg,rgba(255,154,158,.3),rgba(250,208,196,.2));border-color:#ff9a9e;font-weight:600}

.section{background:rgba(255,255,255,.05);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;margin-bottom:20px;animation:fadeInUp .4s ease}
.section-title{font-size:22px;margin-bottom:18px;display:flex;align-items:center;gap:10px}

.res-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:22px;margin-bottom:14px;
  transition:all .3s;animation:fadeInUp .3s ease backwards;
}
.res-card:hover{background:rgba(255,154,158,.08);transform:translateY(-3px)}
.res-type{display:inline-block;padding:3px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:10px}
.res-type.strategy{background:rgba(255,154,158,.2);color:#ff9a9e}
.res-type.news{background:rgba(255,211,42,.2);color:#ffd32a}
.res-type.crypto{background:rgba(102,126,234,.2);color:#667eea}
.res-type.stock{background:rgba(46,213,115,.2);color:#2ed573}
.res-title{font-size:18px;font-weight:600;margin-bottom:10px}
.res-content{color:rgba(255,255,255,.7);font-size:14px;line-height:1.8;white-space:pre-wrap}
.res-tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.res-tag{padding:2px 10px;background:rgba(255,255,255,.08);border-radius:10px;font-size:12px;color:rgba(255,255,255,.5)}
.res-link{display:inline-block;margin-top:10px;color:#ff9a9e;font-size:13px;text-decoration:none}
.res-link:hover{text-decoration:underline}

/* Strategy cards */
.strategy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.strategy-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:20px;transition:all .3s;
  animation:fadeInUp .3s ease backwards;
}
.strategy-card:hover{background:rgba(255,154,158,.08);transform:translateY(-3px)}
.strategy-card h4{font-size:16px;color:#ff9a9e;margin-bottom:8px}
.strategy-card p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.7}
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <div class="logo" @click="goHome">📈 投资理财</div>
    <button class="back-btn" @click="goHome">← 返回主页</button>
  </div>

  <div class="main">
    <div class="menu-grid">
      <div class="menu-item" :class="{active:sub==='all'}" @click="sub='all'">📊 全部内容</div>
      <div class="menu-item" :class="{active:sub==='strategy'}" @click="sub='strategy'">📋 投资策略</div>
      <div class="menu-item" :class="{active:sub==='stock'}" @click="sub='stock'">📉 股票分析</div>
      <div class="menu-item" :class="{active:sub==='fund'}" @click="sub='fund'">🏦 基金指南</div>
      <div class="menu-item" :class="{active:sub==='crypto'}" @click="sub='crypto'">₿ 加密货币</div>
      <div class="menu-item" :class="{active:sub==='news'}" @click="sub='news'">📰 市场资讯</div>
      <div class="menu-item" :class="{active:sub==='risk'}" @click="sub='risk'">⚠️ 风险管理</div>
    </div>

    <div class="section">
      <div class="section-title">📊 {{ subTitle }}</div>
      <div class="strategy-grid" v-if="displayItems.length">
        <div class="strategy-card" v-for="(item,i) in displayItems" :key="i" :style="'animation-delay:'+(i*0.05)+'s'">
          <span class="res-type" :class="item.resource_type">{{ typeName(item.resource_type) }}</span>
          <h4>{{ item.title }}</h4>
          <p>{{ item.content }}</p>
          <div class="res-tags" v-if="item.tags">
            <span class="res-tag" v-for="t in item.tags.split(',')" :key="t.trim()">{{ t.trim() }}</span>
          </div>
          <a class="res-link" :href="item.url" target="_blank" v-if="item.url">🔗 查看详情</a>
        </div>
      </div>
      <div v-else style="text-align:center;padding:40px;color:rgba(255,255,255,.3)">暂无相关内容</div>
    </div>
  </div>
</div>

<script>
const {createApp}=Vue;
createApp({
  data(){
    return{
      sub:'all',
      items:[],
    }
  },
  computed:{
    subTitle(){
      return{all:'全部内容',strategy:'投资策略',stock:'股票分析',fund:'基金指南',crypto:'加密货币',news:'市场资讯',risk:'风险管理'}[this.sub]||'内容';
    },
    displayItems(){
      if(this.sub==='all') return this.items;
      if(this.sub==='strategy') return this.items.filter(i=>i.resource_type==='strategy');
      if(this.sub==='stock') return this.items.filter(i=>i.resource_type==='stock'||(i.tags||'').includes('stock'));
      if(this.sub==='fund') return this.items.filter(i=>(i.tags||'').includes('ETF')||(i.tags||'').includes('Fund'));
      if(this.sub==='crypto') return this.items.filter(i=>i.resource_type==='crypto');
      if(this.sub==='news') return this.items.filter(i=>i.resource_type==='news');
      if(this.sub==='risk') return this.items.filter(i=>(i.tags||'').includes('Risk'));
      return this.items;
    }
  },
  methods:{
    goHome(){window.location.href='/main'},
    typeName(t){return{strategy:'策略',news:'资讯',crypto:'加密货币',stock:'股票'}[t]||t},
    async loadData(){
      const r=await fetch('/api/investment',{headers:{'Authorization':'Bearer '+token}});
      if(r.ok) this.items=await r.json();
    },
  },
  mounted(){this.loadData()}
}).mount('#app');

const token=localStorage.getItem('token')||'';
if(!token) window.location.href='/';
</script>
</body>
</html>
